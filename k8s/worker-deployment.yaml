apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ticketing
  labels: { app: worker }
spec:
  replicas: 1
  selector:
    matchLabels: { app: worker }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: worker }
    spec:
      serviceAccountName: worker-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup:   1001
      containers:
      - name: worker
        image: ghcr.io/GITHUB_USER/event-ticketing/worker:latest
        envFrom:
        - configMapRef: { name: app-config }
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: db-secret, key: POSTGRES_PASSWORD }
        resources:
          requests: { cpu: "50m",  memory: "64Mi" }
          limits:   { cpu: "300m", memory: "256Mi" }
        livenessProbe:
          exec:
            command: ["node", "-e", "process.exit(0)"]
          initialDelaySeconds: 15
          periodSeconds: 30
