# Zabrani sav promet po defaultu
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: ticketing
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
# API moze primati promet od frontenda i Ingressa
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: ticketing
spec:
  podSelector:
    matchLabels: { app: api }
  ingress:
  - from:
    - podSelector: { matchLabels: { app: frontend } }
    - namespaceSelector:
        matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
    ports:
    - { protocol: TCP, port: 8080 }
  egress:
  - to:
    - podSelector: { matchLabels: { app: postgres } }
    ports: [{ protocol: TCP, port: 5432 }]
  - to:
    - podSelector: { matchLabels: { app: redis } }
    ports: [{ protocol: TCP, port: 6379 }]
---
# Worker moze pristupati bazi i Redisu
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-egress
  namespace: ticketing
spec:
  podSelector:
    matchLabels: { app: worker }
  egress:
  - to:
    - podSelector: { matchLabels: { app: postgres } }
    ports: [{ protocol: TCP, port: 5432 }]
  - to:
    - podSelector: { matchLabels: { app: redis } }
    ports: [{ protocol: TCP, port: 6379 }]
---
# Frontend prima promet od Ingressa
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: ticketing
spec:
  podSelector:
    matchLabels: { app: frontend }
  ingress:
  - from:
    - namespaceSelector:
        matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
    ports: [{ protocol: TCP, port: 3000 }]
