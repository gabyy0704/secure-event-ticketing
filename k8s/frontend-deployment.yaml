apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ticketing
  labels: { app: frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101   # nginx user
      containers:
      - name: frontend
        image: ghcr.io/GITHUB_USER/event-ticketing/frontend:latest
        ports:
        - containerPort: 3000
        resources:
          requests: { cpu: "50m",  memory: "32Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
        livenessProbe:
          httpGet: { path: /healthz, port: 3000 }
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet: { path: /healthz, port: 3000 }
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ticketing
spec:
  selector: { app: frontend }
  ports:
  - port: 80
    targetPort: 3000
